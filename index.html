<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>泰语学习卡</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;overflow:hidden;touch-action:manipulation}
        body{font-family:'Leelawadee UI',Thonburi,Tahoma,sans-serif;background:#f4f7f9;display:flex;flex-direction:column;padding:4px}
        .container{width:100%;max-width:400px;margin:0 auto;flex:1;display:flex;flex-direction:column;overflow:hidden}
        .top{display:flex;gap:4px;align-items:center;margin-bottom:4px;flex-shrink:0}
        .top>div{background:#fff;border-radius:6px;padding:4px 8px;font-size:11px;box-shadow:0 1px3px rgba(0,0,0,0.05)}
        .top .streak{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;font-weight:bold;padding:4px 6px}
        .nav{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;flex-shrink:0}
        .nav button{flex:1 1 15%;min-width:40px;padding:4px 2px;font-size:9px;border:1px solid #eee;border-radius:4px;background:#fff;cursor:pointer}
        .nav button.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
        .card{flex:1;position:relative;background:#fff;border-radius:10px;box-shadow:0 2px8px rgba(0,0,0,0.08);margin-bottom:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;cursor:pointer}
        .card.flip{transform:rotateY(180deg)}
        .card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px}
        .card-back{transform:rotateY(180deg);justify-content:space-around}
        .main-char{font-size:60px;color:#333}
        .hint{font-size:9px;color:#bbb;margin-top:4px}
        .info{font-size:14px;color:#1a73e8;font-weight:bold;display:flex;align-items:center;gap:4px}
        .tone{font-size:10px;background:#e1ecf4;padding:2px4px;border-radius:3px;color:#1a73e8}
        .type{font-size:11px;color:#e67e22;font-weight:bold;margin:2px0}
        .tone-table{width:95%;font-size:8px;border-collapse:collapse;margin:2px0}
        .tone-table th,.tone-table td{padding:2px;border:1px solid #ddd;text-align:center}
        .tone-table th{background:#f0f0f0}
        .hl{color:#d32f2f;font-weight:bold}
        .kbd{font-size:9px;color:#999}
        .pairs{display:flex;gap:4px;margin-bottom:3px;flex-shrink:0}
        .pair{flex:1;background:#fff;border-radius:6px;border:1px dashed #ddd;padding:2px;text-align:center;font-size:8px}
        .pair .ch{font-size:16px;color:#333}
        .mastery{display:flex;gap:3px;margin-bottom:3px;flex-shrink:0}
        .mastery button{flex:1;padding:4px;font-size:10px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer}
        .mastery button:nth-child(1).sel{background:#dc3545;color:#fff}
        .mastery button:nth-child(2).sel{background:#fd7e14;color:#fff}
        .mastery button:nth-child(3).sel{background:#ff3107;color:#fff}
        .mastery button:nth-child(4).sel{background:#28a745;color:#fff}
        .bar{height:3px;background:#eee;border-radius:2px;margin-bottom:3px;flex-shrink:0}
        .bar-fill{height:100%;background:linear-gradient(90deg,#ff3107,#28a745);border-radius:2px;transition:width .3s}
        .bottom{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:#888;margin-bottom:2px;flex-shrink:0}
        .ctrl{display:flex;gap:4px;flex-shrink:0}
        .ctrl button{flex:1;padding:6px;font-size:11px;border:none;border-radius:6px;background:#1a73e8;color:#fff;cursor:pointer}
        .ctrl button:nth-child(2){background:#6f42c1}
        .c-mid{background:#28a745}.c-high{background:#dc3545}.c-low-p{background:#fd7e14}.c-low-s{background:#e67e22}.c-vs{background:#6f42c1}.c-vl{background:#17a2b8}
        .toast{position:fixed;bottom:10px;left:50%;transform:translateX(-50%) translateY(60px);background:#333;color:#fff;padding:6px12px;border-radius:6px;font-size:11px;opacity:0;transition:all .3s;z-index:100}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    </style>
</head>
<body>
<div class="container">
    <div class="top">
        <div>今<span id="st">0</span></div>
        <div>总<span id="ss">0</span></div>
        <div>掌<span id="sm">0</span></div>
        <div class="streak" id="sr">🔥0</div>
    </div>
    <div class="nav" id="nav"></div>
    <div class="card" id="card" onclick="flip()">
        <div class="card-face card-front">
            <span id="tag" class="tag"></span>
            <div class="main-char" id="fc">ก</div>
            <div class="hint">点击翻转</div>
        </div>
        <div class="card-face card-back">
            <div class="info"><span id="bp"></span><span class="tone" id="bt"></span></div>
            <div class="type" id="btype"></div>
            <div id="tbox"></div>
            <div class="kbd" id="bk"></div>
        </div>
    </div>
    <div class="pairs" id="pairs">
        <div class="pair" id="p1"><div class="ch" id="p1c"></div><div id="p1l"></div></div>
        <div class="pair" id="p2"><div class="ch" id="p2c"></div><div id="p2l"></div></div>
    </div>
    <div class="mastery">
        <button onclick="setM(0)">不认识</button>
        <button onclick="setM(1)">模糊</button>
        <button onclick="setM(2)">熟悉</button>
        <button onclick="setM(3)">掌握</button>
    </div>
    <div class="bar"><div class="bar-fill" id="bf" style="width:0%"></div></div>
    <div class="bottom">
        <span><span id="cur">1</span>/<span id="tot">0</span></span>
        <span id="mt" style="color:#28a745"></span>
    </div>
    <div class="ctrl">
        <button onclick="prev()">←</button>
        <button onclick="rnd()">随机</button>
        <button onclick="next()">→</button>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
let D={c:[],cards:[]},C=[],i=0,cat='all';
const SK='tcp',STK='tcs';
const lp=()=>JSON.parse(localStorage.getItem(SK)||'{}');
const sp=p=>localStorage.setItem(SK,JSON.stringify(p));
const ls=()=>JSON.parse(localStorage.getItem(STK)||'{"today":{},"streak":1}');
const ss=s=>localStorage.setItem(STK,JSON.stringify(s));
const tk=()=>new Date().toISOString().slice(0,10);
const es=s=>{const t=tk(),y=new Date(Date.now()-864e6).toISOString().slice(0,10);if(s.lastDate===t)return s;if(s.lastDate!==y)s.streak=1;return s};
const rs=(id,m)=>{const p=lp();p[id]={m,last:Date.now()};sp(p);const s=es(ls()),td=tk();s.lastDate=td;s.today[td]=(s.today[td]||[]);if(!s.today[td].includes(id))s.today[td].push(id);s.total=(s.total||0)+1;s.streak=Math.max(s.streak,1);ss(s)};
const st=m=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)};
const tt=c=>{if(c==='mid')return'<table class="tone-table"><tr><th>声调</th><th>长</th><th>短</th></tr><tr><td>中辅</td><td>中</td><td>中</td></tr><tr><td>例</td><td><span class=hl>1</span></td><td><span class=hl>2</span></td></tr></table>';if(c==='high')return'<table class="tone-table"><tr><th>声调</th><th>长</th><th>短</th></tr><tr><td>高辅</td><td>中</td><td>低</td></tr><tr><td>例</td><td><span class=hl>5</span></td><td><span class=hl>2</span></td></tr></table>';if(c&&c.startsWith('low'))return'<table class="tone-table"><tr><th>声调</th><th>长</th><th>短</th></tr><tr><td>低辅</td><td>低</td><td>低</td></tr><tr><td>例</td><td><span class=hl>1</span></td><td><span class=hl>4</span></td></tr></table>';return'<div style=font-size:9px;color:#888>短元+促=促声</div>'};
const bf=()=>{document.getElementById('nav').innerHTML=D.c.map(c=>`<button class=${c.id===cat?'active':''} onclick="sf('${c.id}',this)">${c.label}</button>`).join('')};
const bc=()=>{C=D.cards.filter(x=>cat==='all'||x.cat===cat);i=0;r()};
const ml=['不认识','模糊','熟悉','掌握'],mc=['#dc3545','#fd7e14','#ff3107','#28a745'];
const r=()=>{if(!C.length)return;const x=C[i],el=document.getElementById('card');el.classList.remove('flip');setTimeout(()=>{document.getElementById('fc').innerText=x.c;const tg=document.getElementById('tag');tg.innerText=x.t;tg.className='tag c-'+x.b;document.getElementById('bp').innerText=x.p;document.getElementById('bt').innerText=x.selfTone;document.getElementById('btype').innerText=x.ty;document.getElementById('bk').innerText='⌨'+x.k;document.getElementById('tbox').innerHTML=tt(x.cat);const p1=document.getElementById('p1'),p2=document.getElementById('p2');p1.style.visibility=p2.style.visibility='hidden';if(x.pairs){if(x.pairs[0]){p1.style.visibility='visible';document.getElementById('p1c').innerText=x.pairs[0].char;document.getElementById('p1l').innerText=x.pairs[0].lab;p1.style.background='var(--c-'+x.pairs[0].cls+')'}if(x.pairs[1]){p2.style.visibility='visible';document.getElementById('p2c').innerText=x.pairs[1].char;document.getElementById('p2l').innerText=x.pairs[1].lab}}const m=lp()[x.c]?.m||0;document.getElementById('bf').style.width=(m/3*100)+'%';document.getElementById('mt').innerText=m?ml[m]:'';document.getElementById('mt').style.color=mc[m];document.querySelectorAll('.mastery button').forEach((b,j)=>b.classList.toggle('sel',j===m));document.getElementById('cur').innerText=i+1;document.getElementById('tot').innerText=C.length},150);us()};
const us=()=>{const s=es(ls()),td=tk();document.getElementById('st').innerText=(s.today[td]||[]).length;document.getElementById('ss').innerText=s.total||0;document.getElementById('sm').innerText=Object.values(lp()).filter(p=>p.m>=3).length;document.getElementById('sr').innerText='🔥'+s.streak};
const flip=()=>document.getElementById('card').classList.toggle('flip');
const next=()=>{if(!C.length)return;i=(i+1)%C.length;r()};
const prev=()=>{if(!C.length)return;i=(i-1+C.length)%C.length;r()};
const sf=(c,btn)=>{document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');cat=c;bc()};
const setM=lv=>{rs(C[i].c,lv);r();if(lv>=3)st('🎉');setTimeout(next,400)};
const rnd=()=>{C.sort(()=>Math.random()-.5);i=0;r();st('🎲')};
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')prev();else if(e.key==='ArrowRight')next();else if(e.key===' '||e.key==='Enter'){e.preventDefault();flip()}else if(e.key>='1'&&e.key<='4')setM(parseInt(e.key)-1)});
fetch('data/cards.json').then(r=>r.json()).then(d=>{D=d;bf();bc()});
</script>
</body>
</html>
