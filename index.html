<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>泰语学习卡</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;overflow:hidden}
        body{font-family:'Leelawadee UI',Thonburi,Tahoma,sans-serif;background:#f4f7f9;display:flex;flex-direction:column;padding:6px}
        .box{width:100%;max-width:400px;margin:0 auto;flex:1;display:flex;flex-direction:column;overflow:hidden}
        .bar{display:flex;gap:4px;margin-bottom:4px;flex-shrink:0}
        .bar>div{background:#fff;padding:4px 8px;border-radius:6px;font-size:11px;box-shadow:0 1px2px rgba(0,0,0,0.05)}
        .bar .red{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;font-weight:bold}
        .nav{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:4px}
        .nav button{flex:1 1 15%;padding:4px 1px;font-size:9px;border:1px solid #eee;border-radius:4px;background:#fff;cursor:pointer}
        .nav button.sel{background:#1a73e8;color:#fff;border-color:#1a73e8}
        .card{position:relative;flex:1;background:#fff;border-radius:10px;box-shadow:0 2px6px rgba(0,0,0,0.08);margin-bottom:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
        .char{font-size:55px;color:#333}
        .hint{position:absolute;bottom:8px;font-size:9px;color:#bbb}
        .back{position:absolute;width:100%;height:100%;background:#fcfcfc;border-radius:10px;display:none;flex-direction:column;align-items:center;justify-content:center;padding:10px}
        .back.show{display:flex}
        .p1{font-size:16px;color:#1a73e8;font-weight:bold;margin-bottom:4px}
        .t1{font-size:10px;background:#e1ecf4;padding:2px 6px;border-radius:3px;color:#1a73e8}
        .t2{font-size:11px;color:#e67e22;font-weight:bold;margin:2px 0}
        .kb{font-size:10px;color:#999}
        .tbl{width:90%;font-size:8px;border-collapse:collapse;margin:4px 0}
        .tbl td,.tbl th{padding:2px;border:1px solid #ddd;text-align:center}
        .tbl th{background:#f0f0f0}
        .redtxt{color:#d32f2f;font-weight:bold}
        .pairs{display:flex;gap:4px;margin-bottom:3px}
        .pair{flex:1;background:#fff;padding:4px;border-radius:6px;text-align:center}
        .pairc{font-size:18px;color:#333}
        .pairl{font-size:8px;color:#fff;padding:1px 4px;border-radius:3px;margin-top:2px;display:inline-block}
        .btns{display:flex;gap:3px;margin-bottom:3px}
        .btns button{flex:1;padding:5px;font-size:10px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer}
        .btns button.s0{background:#dc3545;color:#fff}
        .btns button.s1{background:#fd7e14;color:#fff}
        .btns button.s2{background:#ff3107;color:#fff}
        .btns button.s3{background:#28a745;color:#fff}
        .prg{height:3px;background:#eee;border-radius:2px;margin-bottom:3px}
        .prgf{height:100%;background:linear-gradient(90deg,#ff3107,#28a745);border-radius:2px;transition:width .3s}
        .bot{display:flex;justify-content:space-between;font-size:10px;color:#888;margin-bottom:2px}
        .ctr{display:flex;gap:4px}
        .ctr button{flex:1;padding:8px;font-size:12px;border:none;border-radius:8px;background:#1a73e8;color:#fff;cursor:pointer}
        .ctr button.b2{background:#6f42c1}
        .c0{background:#28a745}.c1{background:#dc3545}.c2{background:#fd7e14}.c3{background:#e67e22}.c4{background:#6f42c1}.c5{background:#17a2b8}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#333;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;opacity:0;transition:all .3s;z-index:100}
        .toast.on{transform:translateX(-50%) translateY(0);opacity:1}
    </style>
</head>
<body>
<div class="box">
    <div class="bar">
        <div>今<span id="td">0</span></div>
        <div>总<span id="tt">0</span></div>
        <div>掌<span id="tm">0</span></div>
        <div class="red" id="sk">🔥0</div>
    </div>
    <div class="nav" id="nv"></div>
    <div class="card" onclick="flip()">
        <div class="char" id="ch">ก</div>
        <div class="hint">点击翻转</div>
        <div class="back" id="bk">
            <div class="p1" id="pr"></div>
            <div class="t1" id="tn"></div>
            <div class="t2" id="ty"></div>
            <div class="tbl" id="tb"></div>
            <div class="kb" id="kb"></div>
        </div>
    </div>
    <div class="pairs">
        <div class="pair" id="p1"><div class="pairc" id="p1c"></div><div class="pairl" id="p1l"></div></div>
        <div class="pair" id="p2"><div class="pairc" id="p2c"></div><div class="pairl" id="p2l"></div></div>
    </div>
    <div class="btns">
        <button onclick="rate(0)">不认识</button>
        <button onclick="rate(1)">模糊</button>
        <button onclick="rate(2)">熟悉</button>
        <button onclick="rate(3)">掌握</button>
    </div>
    <div class="prg"><div class="prgf" id="pf" style="width:0%"></div></div>
    <div class="bot">
        <span><span id="cu">1</span>/<span id="to">0</span></span>
        <span id="mt" style="color:#28a745"></span>
    </div>
    <div class="ctr">
        <button onclick="go(-1)">←</button>
        <button class="b2" onclick="shuf()">随机</button>
        <button onclick="go(1)">→</button>
    </div>
</div>
<div class="toast" id="ts"></div>
<script>
var D={c:[]},L=[],I=0,CA='all',F=false;
var SK='tc_p',SK2='tc_s';
function gp(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}}
function sp(p){localStorage.setItem(SK,JSON.stringify(p))}
function gs(){try{return JSON.parse(localStorage.getItem(SK2))||{today:{},streak:1,total:0}}catch{return{today:{},streak:1,total:0}}}
function ss(s){localStorage.setItem(SK2,JSON.stringify(s))}
function td(){return new Date().toISOString().slice(0,10)}
function es(s){var t=td(),y=new Date(Date.now()-864e5).toISOString().slice(0,10);if(s.last==t)return s;if(s.last!=y)s.streak=1;return s}
function st(m){var t=document.getElementById('ts');t.innerText=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},1200)}
function tt(c){if(c=='mid')return'<table class="tbl"><tr><th>声</th><th>长</th><th>短</th></tr><tr><td>中</td><td>中</td><td>中</td></tr><tr><td>例</td><td><span class=redtxt>1</span></td><td><span class=redtxt>2</span></td></tr></table>';if(c=='high')return'<table class="tbl"><tr><th>声</th><th>长</th><th>短</th></tr><tr><td>高</td><td>中</td><td>低</td></tr><tr><td>例</td><td><span class=redtxt>5</span></td><td><span class=redtxt>2</span></td></tr></table>';if(c&&c.startsWith('low'))return'<table class="tbl"><tr><th>声</th><th>长</th><th>短</th></tr><tr><td>低</td><td>低</td><td>低</td></tr><tr><td>例</td><td><span class=redtxt>1</span></td><td><span class=redtxt>4</span></td></tr></table>';return'<div style=font-size:9px;color:#888>短+促=促声</div>'}
function bn(){document.getElementById('nv').innerHTML=D.c.map(function(c){return'<button class="'+(c.id==CA?'sel':'')+'" onclick="sf(\''+c.id+'\',this)">'+c.label+'</button>'}).join('')}
function fl(){L=D.cards.filter(function(x){return CA=='all'||x.cat==CA});I=0;dr()}
var ml=['不认识','模糊','熟悉','掌握'],mc=['#dc3545','#fd7e14','#ff3107','#28a745'];
function dr(){if(L.length==0)return;var x=L[I];var bk=document.getElementById('bk');bk.classList.remove('show');F=false;setTimeout(function(){document.getElementById('ch').innerText=x.c;document.getElementById('pr').innerText=x.p;document.getElementById('tn').innerText=x.selfTone;document.getElementById('ty').innerText=x.ty;document.getElementById('kb').innerText='键盘:'+x.k;document.getElementById('tb').innerHTML=tt(x.cat);var p1=document.getElementById('p1'),p2=document.getElementById('p2');p1.style.visibility=p2.style.visibility='hidden';if(x.pairs){if(x.pairs[0]){p1.style.visibility='visible';document.getElementById('p1c').innerText=x.pairs[0].char;var l1=document.getElementById('p1l');l1.innerText=x.pairs[0].lab;l1.className='pairl c'+(x.pairs[0].cls||'0').slice(-1)}if(x.pairs[1]){p2.style.visibility='visible';document.getElementById('p2c').innerText=x.pairs[1].char;var l2=document.getElementById('p2l');l2.innerText=x.pairs[1].lab;l2.className='pairl c'+(x.pairs[1].cls||'0').slice(-1)}}var m=gp()[x.c]||0;document.getElementById('pf').style.width=(m/3*100)+'%';document.getElementById('mt').innerText=m?ml[m]:'';document.getElementById('mt').style.color=mc[m];document.querySelectorAll('.btns button').forEach(function(b,i){b.className=i===m?'btns button s'+m:'btns button'});document.getElementById('cu').innerText=I+1;document.getElementById('to').innerText=L.length},150);up()}
function up(){var s=es(gs()),t=td();document.getElementById('td').innerText=(s.today[t]||[]).length;document.getElementById('tt').innerText=s.total;document.getElementById('tm').innerText=Object.values(gp()).filter(function(p){return p>=3}).length;document.getElementById('sk').innerText='🔥'+s.streak}
function flip(){var b=document.getElementById('bk');F=!F;if(F)b.classList.add('show');else b.classList.remove('show')}
function go(d){if(L.length==0)return;I=(I+d+L.length)%L.length;dr()}
function sf(c,btn){document.querySelectorAll('.nav button').forEach(function(b){b.className=''});btn.className='sel';CA=c;fl()}
function rate(lv){var id=L[I].c;var p=gp();p[id]=lv;sp(p);var s=es(gs());s.last=td();s.today[td()]=(s.today[td()]||[]);if(!s.today[td()].includes(id))s.today[td()].push(id);s.total++;s.streak=Math.max(s.streak,1);ss(s);dr();if(lv>=3)st('🎉');setTimeout(function(){go(1)},400)}
function shuf(){L.sort(function(){return Math.random()-0.5});I=0;dr();st('🎲')}
document.addEventListener('keydown',function(e){if(e.key=='ArrowLeft')go(-1);else if(e.key=='ArrowRight')go(1);else if(e.key==' '||e.key=='Enter'){e.preventDefault();flip()}else if(e.key>='1'&&e.key<='4')rate(parseInt(e.key)-1)});
fetch('data/cards.json').then(function(r){return r.json()}).then(function(d){D=d;bn();fl()}).catch(function(e){document.getElementById('ch').innerText='加载失败';console.error(e)});
</script>
</body>
</html>
