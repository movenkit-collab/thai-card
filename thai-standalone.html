<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰语全体系学习卡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Leelawadee UI', 'Thonburi', 'Tahoma', 'PingFang SC', sans-serif; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; padding: 15px; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center; }

        /* 统计栏 */
        .stats-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; background: white; padding: 10px 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .stat-item { text-align: center; flex: 1; }
        .stat-num { font-size: 20px; font-weight: bold; color: #1a73e8; }
        .stat-label { font-size: 10px; color: #999; margin-top: 2px; }
        .streak-badge { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 4px; }

        /* 导航 */
        .filter-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 15px; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); width: 100%; }
        .filter-btn { padding: 8px 6px; border: 1px solid #eee; border-radius: 8px; background: #fff; cursor: pointer; font-size: 10px; font-weight: bold; flex: 1 1 18%; min-width: 55px; transition: all 0.2s; }
        .filter-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }
        .filter-btn:active { transform: scale(0.95); }

        /* 收藏筛选 */
        .filter-row { display: flex; gap: 6px; width: 100%; margin-bottom: 12px; }
        .filter-row button { flex: 1; padding: 6px; border: 1px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 11px; color: #666; transition: all 0.2s; }
        .filter-row button.active { background: #fff3cd; color: #856404; border-color: #ffc107; }

        /* 卡片区域 */
        .card-area { perspective: 1000px; width: 100%; height: 380px; cursor: pointer; margin-bottom: 12px; }
        .card { position: relative; width: 100%; height: 100%; transition: transform 0.4s; transform-style: preserve-3d; border-radius: 20px; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; padding: 15px; background: white; border: 1px solid #eee; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .back { transform: rotateY(180deg); background: #fcfcfc; justify-content: space-around; }

        /* 卡片内部 */
        .card-header { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; }
        .tag { font-size: 11px; padding: 4px 10px; border-radius: 8px; color: white; font-weight: bold; }
        .star-btn { background: none; border: none; font-size: 22px; cursor: pointer; transition: transform 0.2s; padding: 2px; }
        .star-btn:active { transform: scale(1.3); }
        .star-btn .starred { color: #ffc107; }
        .star-btn .unstarred { color: #ddd; }
        .main-char { font-size: 95px; color: #333; line-height: 1.2; }
        .card-hint { position: absolute; bottom: 15px; font-size: 11px; color: #bbb; }

        .p-text { font-size: 28px; color: #1a73e8; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .tone-icon { font-size: 13px; background: #e1ecf4; padding: 2px 6px; border-radius: 4px; color: #1a73e8; font-weight: normal; }
        .type-tag { font-size: 13px; color: #e67e22; font-weight: bold; }
        #tone-box { width: 100%; margin: 5px 0; }
        .tone-table { width: 100%; border-collapse: collapse; font-size: 10px; background: white; border: 1px solid #ddd; }
        .tone-table th { background: #f0f0f0; padding: 4px 2px; border: 1px solid #ddd; }
        .tone-table td { padding: 6px 2px; border: 1px solid #ddd; text-align: center; }
        .highlight-tone { color: #dc3545; font-weight: bold; font-size: 12px; }
        .kbd { font-size: 11px; color: #999; }

        /* 关联卡 */
        .pairs-row { display: flex; gap: 8px; justify-content: center; width: 100%; margin-bottom: 12px; height: 100px; }
        .pair-hint { flex: 1; max-width: 130px; background: white; border-radius: 12px; border: 2px dashed #ddd; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 5px; }
        .pair-tag { position: absolute; top: 4px; font-size: 9px; color: #aaa; }
        .pair-char { font-size: 32px; color: #333; margin-top: 8px; }
        .pair-label { font-size: 9px; padding: 2px 4px; border-radius: 4px; color: white; margin-top: 4px; }

        /* 掌握度指示器 */
        .mastery-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-bottom: 8px; overflow: hidden; }
        .mastery-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; background: linear-gradient(90deg, #ffc107, #28a745); }

        /* 控制区 */
        .progress { margin: 5px 0; color: #888; font-size: 12px; width: 100%; display: flex; justify-content: space-between; }
        .ctrl { display: flex; gap: 10px; width: 100%; justify-content: center; }
        .ctrl button { flex: 1; padding: 12px; border: none; border-radius: 12px; background: #1a73e8; color: white; cursor: pointer; font-weight: bold; font-size: 14px; max-width: 110px; transition: all 0.15s; }
        .ctrl button:active { transform: scale(0.95); opacity: 0.9; }

        /* 掌握度评分按钮 */
        .mastery-btns { display: flex; gap: 8px; width: 100%; margin-top: 10px; justify-content: center; }
        .mastery-btn { padding: 8px 14px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; font-size: 12px; color: #666; transition: all 0.2s; }
        .mastery-btn:active { transform: scale(0.95); }
        .mastery-btn.m-0 { border-color: #dc3545; }
        .mastery-btn.m-0.selected { background: #dc3545; color: white; }
        .mastery-btn.m-1 { border-color: #fd7e14; }
        .mastery-btn.m-1.selected { background: #fd7e14; color: white; }
        .mastery-btn.m-2 { border-color: #ffc107; }
        .mastery-btn.m-2.selected { background: #ffc107; color: white; }
        .mastery-btn.m-3 { border-color: #28a745; }
        .mastery-btn.m-3.selected { background: #28a745; color: white; }

        /* Toast 提示 */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #333; color: white; padding: 10px 20px; border-radius: 10px; font-size: 13px; opacity: 0; transition: all 0.3s ease; z-index: 100; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* 颜色 */
        .c-mid { background: #28a745; } .c-high { background: #dc3545; }
        .c-low-p { background: #fd7e14; } .c-low-s { background: #e67e22; }
        .c-vs { background: #6f42c1; } .c-vl { background: #17a2b8; }
    </style>
</head>
<body>

<div class="container">
    <!-- 统计栏 -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-num" id="s-today">0</div>
            <div class="stat-label">今日学习</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="s-total">0</div>
            <div class="stat-label">累计学习</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="s-mastered">0</div>
            <div class="stat-label">已掌握</div>
        </div>
        <div class="streak-badge" id="s-streak">🔥 1天</div>
    </div>

    <!-- 分类导航 -->
    <div class="filter-nav" id="filter-nav"></div>

    <!-- 额外筛选 -->
    <div class="filter-row">
        <button id="f-starred" onclick="toggleStarFilter()">⭐ 只看收藏</button>
        <button id="f-weak" onclick="toggleWeakFilter()">💪 优先薄弱</button>
    </div>

    <!-- 卡片 -->
    <div class="card-area" onclick="flip()">
        <div class="card" id="card">
            <div class="face front">
                <div class="card-header">
                    <span id="label" class="tag"></span>
                    <button class="star-btn" onclick="event.stopPropagation(); toggleStar()">
                        <span id="star-icon" class="unstarred">☆</span>
                    </button>
                </div>
                <div class="main-char" id="f-char">ก</div>
                <div class="card-hint">点击翻转</div>
            </div>
            <div class="face back">
                <div class="p-text">
                    <span id="b-pron">-</span>
                    <span class="tone-icon" id="b-tone">-</span>
                </div>
                <div class="type-tag" id="b-type">-</div>
                <div id="tone-box"></div>
                <div class="kbd" id="b-key">-</div>
            </div>
        </div>
    </div>

    <!-- 掌握度进度条 -->
    <div class="mastery-bar"><div class="mastery-fill" id="mastery-fill" style="width:0%"></div></div>

    <!-- 关联卡 -->
    <div class="pairs-row" id="pairs-row">
        <div class="pair-hint" id="p1"><span class="pair-tag" id="p1-tag">-</span><div class="pair-char" id="p1-char">-</div><div class="pair-label" id="p1-label">-</div></div>
        <div class="pair-hint" id="p2"><span class="pair-tag" id="p2-tag">-</span><div class="pair-char" id="p2-char">-</div><div class="pair-label" id="p2-label">-</div></div>
    </div>

    <!-- 掌握度评分 -->
    <div class="mastery-btns">
        <button class="mastery-btn m-0" onclick="setMastery(0)">不认识</button>
        <button class="mastery-btn m-1" onclick="setMastery(1)">模糊</button>
        <button class="mastery-btn m-2" onclick="setMastery(2)">熟悉</button>
        <button class="mastery-btn m-3" onclick="setMastery(3)">掌握</button>
    </div>

    <!-- 进度 & 控制 -->
    <div class="progress">
        <span>进度: <span id="cur">1</span> / <span id="total">0</span></span>
        <span id="mastery-text" style="color:#28a745"></span>
    </div>
    <div class="ctrl">
        <button onclick="prev()">上一个</button>
        <button style="background:#6f42c1" onclick="doShuffle()">随机</button>
        <button onclick="next()">下一个</button>
    </div>
</div>

<div class="toast" id="toast"></div>
